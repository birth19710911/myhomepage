<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>私のホームページ</title>
  <style>
    .new-badge {
      display: inline-block;
      padding: 2px 6px;
      margin-right: 8px;
      background-color: white;
      color: red;
      font-size: 12px;
      font-weight: bold;
      border-radius: 4px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 京都産業大学ラグビー部ファーストジャージ風 横縞背景 */
    body {color: white;
      background: repeating-linear-gradient(
        to bottom,
        #001A57,
        #001A57 60px,
        #8B0000 60px,
        #8B0000 120px
      );
      color: white; /* ← これが重要！文字を白にする */
    }
  </style>
</head>
<body>
  <h1>こんにちは！</h1>
  <p>
    <span class="new-badge">NEW</span>
    これは私が GitHub で作った最初のホームページです。
  </p>

    <h2>京都産業大学ラグビー部戦績</h2>
  <p>ここに戦績を追加していきます。</p>

</body>
</html>
