<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>私のホームページ</title>
  <style>
    .new-badge {
      display: inline-block;
      padding: 2px 6px;
      margin-right: 8px;
      background-color: white;
      color: red;
      font-size: 12px;
      font-weight: bold;
      border-radius: 4px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 京都産業大学ラグビー部ファーストジャージ風 横縞背景 */
body {
  background:
    /* ハーフウェイライン（中央の白線） */
    linear-gradient(to bottom, white 4px, transparent 4px) 0 50% / 100% 4px no-repeat,

    /* 22mライン（上から22%の位置） */
    linear-gradient(to bottom, white 3px, transparent 3px) 0 22% / 100% 3px no-repeat,

    /* 22mライン（下から22%の位置） */
    linear-gradient(to bottom, white 3px, transparent 3px) 0 78% / 100% 3px no-repeat,

    /* タッチライン（左右の白線） */
    linear-gradient(to right, white 4px, transparent 4px) 0 0 / 4px 100% no-repeat,
    linear-gradient(to right, white 4px, transparent 4px) 100% 0 / 4px 100% no-repeat,

    /* 芝の色（緑の濃淡） */
    repeating-linear-gradient(
      to bottom,
      #0b6623,
      #0b6623 40px,
      #0a5a1f 40px,
      #0a5a1f 80px
    );

  color: white;
  padding: 20px;
}

  </style>
</head>
<body>
  <h1>こんにちは！</h1>
  <p>
    <span class="new-badge">NEW</span>
    これは私が GitHub で作った最初のホームページです。
  </p>
　 <h2>京都産業大学ラグビー部戦績</h2>
  <p>ここに戦績を追加していきます。</p>

</body>
</html>
