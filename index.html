<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>私のホームページ</title>

  <style>
    /* NEWバッジ */
    .new-badge {
      display: inline-block;
      padding: 2px 6px;
      margin-right: 8px;
      background-color: white;
      color: red;
      font-size: 12px;
      font-weight: bold;
      border-radius: 4px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ページ全体：京産大ジャージ（紺×エンジ） */
    body {
      background:
        repeating-linear-gradient(
          to bottom,
          #001A57,
          #001A57 60px,
          #8B0000 60px,
          #8B0000 120px
        );
      margin: 0;
      padding: 40px 0;
      font-family: sans-serif;
      color: white;
      text-align: center;
    }

/* 中央のラグビー場 */
.field {
  width: 90%;
  max-width: 600px;
  margin: 0 auto;
  padding: 40px;
  border-radius: 20px;
  position: relative;
  height: 700px;

  background:

    /* デッドボールライン（上） */
    linear-gradient(to bottom, white 4px, transparent 4px)
      0 0 / 100% 4px no-repeat,

    /* ゴールライン（上） */
    linear-gradient(to bottom, white 4px, transparent 4px)
      0 50px / 100% 4px no-repeat,

    /* トライゾーン（上） */
    linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0))
      0 0 / 100% 50px no-repeat,

    /* デッドボールライン（下） */
    linear-gradient(to bottom, white 4px, transparent 4px)
      0 calc(100% - 4px) / 100% 4px no-repeat,

    /* ゴールライン（下） */
    linear-gradient(to bottom, white 4px, transparent 4px)
      0 calc(100% - 50px) / 100% 4px no-repeat,

    /* トライゾーン（下） */
    linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0))
      0 calc(100% - 50px) / 100% 50px no-repeat,

    /* ハーフウェイライン */
    linear-gradient(to bottom, white 4px, transparent 4px)
      0 calc(50% - 2px) / 100% 4px no-repeat,

    /* 22mライン（上） */
    linear-gradient(to bottom, white 3px, transparent 3px)
      0 calc(50% - 200px) / 100% 3px no-repeat,

    /* 22mライン（下） */
    linear-gradient(to bottom, white 3px, transparent 3px)
      0 calc(50% + 200px) / 100% 3px no-repeat,

    /* サイドライン（左右） */
    linear-gradient(to right, white 4px, transparent 4px)
      0 0 / 4px 100% no-repeat,
    linear-gradient(to right, white 4px, transparent 4px)
      100% 0 / 4px 100% no-repeat,

    /* 芝の濃淡 */
    repeating-linear-gradient(
      to bottom,
      #0b6623,
      #0b6623 40px,
      #0a5a1f 40px,
      #0a5a1f 80px
    );
}

/* ← ここからゴールポスト（field の外） */

/* ゴールポスト（上） */
.goalpost-top {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 40px;
  border-left: 4px solid white;
  border-right: 4px solid white;
  border-top: 4px solid white;
}

/* ゴールポスト（下） */
.goalpost-bottom {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 40px;
  border-left: 4px solid white;
  border-right: 4px solid white;
  border-bottom: 4px solid white;
}

/* h2 の位置調整 */
.field h2 {
  margin-top: 120px;
  color: white;
}

    /* 戦績表 */
table {
  width: auto;              /* ← これが超重要！ */
  max-width: 100%;          /* ← フィールド内で収まる */
  margin: 0 auto;           /* ← 中央寄せ */
  border-collapse: collapse;
  background: rgba(255,255,255,0.9);
  color: #000;
  border-radius: 10px;
  overflow: hidden;
}

    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #eee;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>こんにちは！</h1>

  <p>
    <span class="new-badge">NEW</span>
    これは私が GitHub で作った最初のホームページです。
  </p>

  <!-- ラグビー場 -->
  <div class="field">

    <!-- ゴールポスト -->
    <div class="goalpost-top"></div>
    <div class="goalpost-bottom"></div>

    <!-- 戦績表 -->
<h2 style="color:white; margin-top:120px;">京都産業大学ラグビー部戦績</h2>

    <table>
      <tr>
        <th>年度</th>
        <th>大会</th>
        <th>対戦相手</th>
        <th>スコア</th>
      </tr>
      <tr>
        <td>2024</td>
        <td>関西大学リーグ</td>
        <td>同志社大学</td>
        <td>○ 28-21</td>
      </tr>
      <tr>
        <td>2024</td>
        <td>関西大学リーグ</td>
        <td>立命館大学</td>
        <td>● 17-20</td>
      </tr>
    </table>

  </div>

</body>
</html>
