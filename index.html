<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>京都産業大学ラグビー部|試合結果|試合結果・戦績まとめ（非公式）</title>

  <style>
    /* NEWバッジ */
    .new-badge {
      display: inline-block;
      padding: 2px 6px;
      margin-right: 8px;
      background-color: white;
      color: red;
      font-size: 12px;
      font-weight: bold;
      border-radius: 4px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ページ全体：京産大ジャージ（紺×エンジ） */
    body {
      background:
        repeating-linear-gradient(
          to bottom,
          #001A57,
          #001A57 60px,
          #8B0000 60px,
          #8B0000 120px
        );
      margin: 0;
      padding: 40px 0;
      font-family: sans-serif;
      color: white;
      text-align: center;
    }

    /* ラグビー場 */
    .field {
      width: 90%;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px;
      border-radius: 20px;
      position: relative;
      z-index: 0; /* ← 背景を一番後ろにする */
      height: 700px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);

      background:

        /* デッドボールライン（上） */
        linear-gradient(to bottom, white 4px, transparent 4px)
          0 0 / 100% 4px no-repeat,

        /* ゴールライン（上） */
        linear-gradient(to bottom, white 4px, transparent 4px)
          0 50px / 100% 4px no-repeat,

        /* トライゾーン（上） */
        linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0))
          0 0 / 100% 50px no-repeat,

        /* デッドボールライン（下） */
        linear-gradient(to bottom, white 4px, transparent 4px)
          0 calc(100% - 4px) / 100% 4px no-repeat,

        /* ゴールライン（下） */
        linear-gradient(to bottom, white 4px, transparent 4px)
          0 calc(100% - 50px) / 100% 4px no-repeat,

        /* トライゾーン（下） */
        linear-gradient(to bottom, rgba(255,255,255,0.2), rgba(255,255,255,0))
          0 calc(100% - 50px) / 100% 50px no-repeat,

        /* ハーフウェイライン */
        linear-gradient(to bottom, white 4px, transparent 4px)
          0 calc(50% - 2px) / 100% 4px no-repeat,

        /* 22mライン（上） */
        linear-gradient(to bottom, white 3px, transparent 3px)
          0 calc(50% - 200px) / 100% 3px no-repeat,

        /* 22mライン（下） */
        linear-gradient(to bottom, white 3px, transparent 3px)
          0 calc(50% + 200px) / 100% 3px no-repeat,

        /* サイドライン（左右） */
        linear-gradient(to right, white 4px, transparent 4px)
          0 0 / 4px 100% no-repeat,
        linear-gradient(to right, white 4px, transparent 4px)
          100% 0 / 4px 100% no-repeat,

        /* 芝の濃淡 */
        repeating-linear-gradient(
          to bottom,
          #0b6623,
          #0b6623 40px,
          #0a5a1f 40px,
          #0a5a1f 80px
        );
    }

    /* ゴールポスト（前面に出す） */
    .goalpost-top,
    .goalpost-bottom {
      position: absolute;
      z-index: 5; /* ← 背景より前に出す */
    }

    /* センターサークル */
    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      border: 3px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      display: none;
    }

    /* 戦績表（フィールド内に置く） */
    .field h2 {
      margin-top: 120px;
      background: white;
      color: black;
      padding: 10px;
      border-radius: 10px;
      position: relative;
      z-index: 10; /* ← 白線より前に出す */
    }

    .field table {
      width: 100%;
      background: white;
      color: #000;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      margin-top: 20px;
      position: relative;
      z-index: 10; /* ← 白線より前に出す */
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #f5f5f5;
      font-weight: bold;
    }
    tr:last-child td {
      border-bottom: none;
    }

  </style>
</head>

<body>

<p style="text-align:center; font-size:14px;">
京都産業大学ラグビー部の非公式戦績まとめページです。
</p>

<h1>京都産業大学ラグビーファンのみなさまへ</h1>

<p>
  <span class="new-badge">NEW</span>
  京都産業大学ラグビー部を応援するページです
</p>

<!-- ラグビー場 -->
<div class="field">

  <!-- ゴールポスト -->
  <div class="goalpost-top"><div></div></div>
  <div class="goalpost-bottom">
    <div class="bar"></div>
    <div class="right-top"></div>
    <div class="right-bottom"></div>
  </div>

  <!-- 戦績表（フィールド内） -->
  <h2>京都産業大学ラグビー部戦績</h2>

  <table>
    <tr>
      <th>年度</th>
      <th>大会</th>
      <th>対戦相手</th>
      <th>スコア</th>
    </tr>
    <tr>
      <td>2026</td>
      <td>関西大学春季トーナメント2回戦</td>
      <td>立命館大学</td>
      <td>○ 19-7</td>
    </tr>
    <tr>
      <td>2026</td>
      <td>関西大学春季トーナメント3回戦</td>
      <td>近畿大学</td>
      <td>○ 27-26</td>
    </tr>
    <tr>
      <td>2026</td>
      <td>関西大学春季トーナメント順位決定戦</td>
      <td>天理大学</td>
      <td>○ 28-24</td>
    </tr>
  </table>

</div>

</body>
</html>
